<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>For My Kassi ❤️</title>
    <style>
        body {
            margin: 0;
            background: black;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            overflow-x: hidden;
            touch-action: manipulation;
        }

        canvas#space {
            position: fixed;
            top: 0;
            left: 0;
            z-index: -1;
        }

        #letter {
            margin-top: 60px;
            font-size: clamp(18px, 5vw, 26px);
            width: 85%;
            margin: 60px auto 20px auto;
            min-height: 1.5em;
            line-height: 1.4;
        }

        #buttons {
            position: relative;
            min-height: 100px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        button {
            padding: 15px 35px;
            font-size: clamp(20px, 6vw, 28px);
            margin: 10px;
            border: none;
            border-radius: 15px;
            cursor: pointer;
            font-weight: bold;
            transition: transform 0.2s, opacity 0.2s;
            z-index: 1000;
        }

        #yes { 
            background: #ff2e6e; 
            color: white; 
            box-shadow: 0 0 20px rgba(255, 46, 110, 0.5); 
        }

        #no { 
            background: #444; 
            color: white; 
            position: absolute; 
            white-space: nowrap;
            transition: left 0.3s ease, top 0.3s ease, transform 0.2s;
        }

        /* ГАЛЕРЕЯ */
        #gallery {
            display: none;
            margin-top: 30px;
            position: relative;
            min-height: 500px;
            width: 100%;
        }

        #gallery img {
            width: clamp(80px, 20vw, 130px);
            height: clamp(80px, 20vw, 130px);
            object-fit: cover;
            border-radius: 50%;
            border: 3px solid #ff2e6e;
            position: absolute;
            opacity: 0;
            transform: scale(0.5);
            transition: all 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 0 15px rgba(255, 46, 110, 0.4);
            cursor: zoom-in;
        }

        #gallery img.show {
            opacity: 1;
            transform: scale(1);
        }

        #game { 
            display: none; 
            margin-top: 20px;
            padding-bottom: 40px;
        }

        .heart {
            position: absolute;
            font-size: 35px;
            cursor: pointer;
            z-index: 50;
            user-select: none;
        }

        /* УВЕЛИЧЕНИЕ ФОТО */
        #overlay {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.95);
            z-index: 9999;
            justify-content: center;
            align-items: center;
            cursor: zoom-out;
        }

        #overlay img { 
            max-width: 95%; 
            max-height: 85%; 
            border-radius: 10px; 
            border: 2px solid #ff2e6e; 
        }

        /* ФИНАЛЬНОЕ ПОЗДРАВЛЕНИЕ */
        #final-message {
            display: none;
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(20, 20, 20, 0.98);
            padding: clamp(20px, 5vw, 40px);
            border-radius: 20px;
            border: 2px solid #ff2e6e;
            z-index: 10000;
            width: 85%;
            max-width: 450px;
            box-shadow: 0 0 50px #ff2e6e;
        }

        h2 { font-size: clamp(22px, 6vw, 32px); margin-bottom: 15px; }
        #wish-text { font-size: clamp(16px, 4.5vw, 20px); line-height: 1.5; }
    </style>
</head>
<body>

<canvas id="space"></canvas>

<h1>For You, Kassi ❤️</h1>

<div id="letter"></div>

<div id="buttons">
    <button id="yes" onclick="yes()">Yes ❤️</button>
    <button id="no">No</button>
</div>

<div id="gallery">
    <h2 style="margin-bottom: 60px;">Our Memories 📸</h2>
    <img src="1.jpeg"> <img src="2.jpeg"> <img src="3.jpeg"> <img src="4.jpeg">
    <img src="5.jpeg"> <img src="6.jpeg"> <img src="7.jpeg"> <img src="8.jpeg">
    <img src="9.jpeg"> <img src="10.jpeg"> <img src="11.jpeg"> <img src="12.jpeg">
</div>

<div id="game">
    <h2>Poimay serdechki 🎮</h2>
    <p style="font-size: 20px;">Score: <span id="score">0</span> / 10</p>
</div>

<div id="overlay" onclick="this.style.display='none'">
    <img id="bigImage" src="">
</div>

<div id="final-message">
    <h2 style="color: #ff2e6e;">С 8 Марта, Касси! 💐</h2>
    <p id="wish-text"></p>
    <button style="margin-top: 20px;" onclick="document.getElementById('final-message').style.display='none'">❤️</button>
</div>

<script>
    /* ТЕКСТ ПРИ ЗАГРУЗКЕ */
    const textStr = "Ya sdelal etu malenkuyu vselennuiu dlya tebiya. Potomu chto kogda ty riadom , moi mir stanovitsyia iarche!❤️";
    let charIdx = 0;
    function type() {
        if (charIdx < textStr.length) {
            document.getElementById("letter").innerHTML += textStr.charAt(charIdx);
            charIdx++;
            setTimeout(type, 45);
        }
    }
    type();

    /* КНОПКА "НЕТ" */
    let noBtn = document.getElementById("no");
    noBtn.addEventListener("touchstart", moveNo); // Для телефонов
    noBtn.addEventListener("mouseover", moveNo);   // Для ПК

    function moveNo() {
        const padding = 80;
        let x = Math.random() * (window.innerWidth - padding * 2) + padding;
        let y = Math.random() * (window.innerHeight - padding * 2) + padding;
        
        // Ограничиваем, чтобы не улетала совсем за края
        x = Math.max(10, Math.min(x, window.innerWidth - 100));
        y = Math.max(10, Math.min(y, window.innerHeight - 50));

        noBtn.style.left = x + "px";
        noBtn.style.top = y + "px";
    }

    /* КНОПКА "ДА" */
    function yes() {
        alert("Umnichka ❤️. Другого ответа и не ждал))");
        drawHeartBg();
        document.getElementById("buttons").style.display = "none";
        document.getElementById("gallery").style.display = "block";
        document.getElementById("game").style.display = "block";
        arrangePhotos();
        startGame();
        setupClicks();
    }

    /* ФОТО В СЕРДЦЕ (Адаптивное) */
    function arrangePhotos() {
        const images = document.querySelectorAll("#gallery img");
        const isMobile = window.innerWidth < 768;
        const scale = isMobile ? 0.65 : 1; // Уменьшаем масштаб сердца для телефонов

        const coords = [
            {x: 0, y: 160}, {x: -80, y: 100}, {x: -150, y: 20}, {x: -160, y: -70},
            {x: -100, y: -140}, {x: -30, y: -100}, {x: 30, y: -100}, {x: 100, y: -140},
            {x: 160, y: -70}, {x: 150, y: 20}, {x: 80, y: 100}, {x: 0, y: -20}
        ];

        images.forEach((img, index) => {
            if (coords[index]) {
                const imgHalf = img.offsetWidth / 2 || (isMobile ? 40 : 65);
                img.style.left = `calc(50% + ${(coords[index].x * scale)}px - ${imgHalf}px)`;
                img.style.top = `calc(${isMobile ? 180 : 250}px + ${(coords[index].y * scale)}px)`;
                setTimeout(() => img.classList.add("show"), index * 250); 
            }
        });
    }

    function setupClicks() {
        document.querySelectorAll("#gallery img").forEach(img => {
            img.onclick = function() {
                document.getElementById("bigImage").src = this.src;
                document.getElementById("overlay").style.display = "flex";
            }
        });
    }

    /* ПОЗДРАВЛЕНИЕ */
    function showFinal() {
        const finalBox = document.getElementById("final-message");
        const wishText = document.getElementById("wish-text");
        finalBox.style.display = "block";
        
        let msg = "Умничка! Ты поймала все сердечки, но самое главное — моё — уже давно у тебя. Пусть этот день будет таким же красивым, как твоя улыбка. Спасибо, что ты есть в моей вселенной! Я люблю тебя моя принцесса, с 8 марта!";
        let j = 0;
        wishText.innerHTML = "";
        function typeFinal() {
            if (j < msg.length) {
                wishText.innerHTML += msg.charAt(j);
                j++;
                setTimeout(typeFinal, 50);
            }
        }
        typeFinal();
    }

    /* ФОНОВОЕ СЕРДЦЕ */
    function drawHeartBg() {
        let hCanvas = document.createElement("canvas");
        hCanvas.width = 400; hCanvas.height = 400;
        hCanvas.style.position = "fixed";
        hCanvas.style.left = "50%"; hCanvas.style.top = "50%";
        hCanvas.style.transform = "translate(-50%, -50%)";
        hCanvas.style.zIndex = "-1"; hCanvas.style.opacity = "0.4";
        hCanvas.style.pointerEvents = "none";
        document.body.appendChild(hCanvas);
        let ctx = hCanvas.getContext("2d");
        let t = 0;
        function anim() {
            ctx.clearRect(0, 0, 400, 400); ctx.fillStyle = "#ff2e6e"; ctx.beginPath();
            for (let i = 0; i < Math.PI * 2; i += 0.02) {
                let x = 16 * Math.pow(Math.sin(i), 3);
                let y = 13 * Math.cos(i) - 5 * Math.cos(2 * i) - 2 * Math.cos(3 * i) - Math.cos(4 * i);
                let s = 10 + Math.sin(t) * 1.5;
                ctx.lineTo(200 + x * s, 200 - y * s);
            }
            ctx.fill(); t += 0.05; requestAnimationFrame(anim);
        }
        anim();
    }

    /* КОСМОС */
    let space = document.getElementById("space");
    let sCtx = space.getContext("2d");
    function res() { space.width = window.innerWidth; space.height = window.innerHeight; }
    window.onresize = () => { res(); arrangePhotos(); };
    res();
    let stars = [];
    for (let j = 0; j < 150; j++) stars.push({ x: Math.random() * space.width, y: Math.random() * space.height, r: Math.random() * 1.5 });
    function drawStars() {
        sCtx.clearRect(0, 0, space.width, space.height); sCtx.fillStyle = "white";
        stars.forEach(s => { sCtx.beginPath(); sCtx.arc(s.x, s.y, s.r, 0, Math.PI * 2); sCtx.fill(); });
        requestAnimationFrame(drawStars);
    }
    drawStars();

    /* ИГРА */
    let score = 0;
    let over = false;
    function startGame() {
        let itv = setInterval(() => {
            if (over) { clearInterval(itv); return; }
            let h = document.createElement("div");
            h.innerHTML = "❤️"; h.className = "heart";
            h.style.left = Math.random() * (window.innerWidth - 60) + "px";
            h.style.top = Math.random() * (window.innerHeight - 60) + "px";
            h.onclick = function() {
                score++; document.getElementById("score").innerText = score;
                h.remove();
                if (score === 10) { over = true; showFinal(); }
            }
            document.body.appendChild(h);
            setTimeout(() => { if(h) h.remove(); }, 2500);
        }, 900);
    }
</script>
</body>
</html>
