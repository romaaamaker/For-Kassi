<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>For My Kassi ❤️</title>
    <style>
        body {
            margin: 0;
            background: black;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            overflow-x: hidden;
            touch-action: manipulation;
        }

        canvas#space { position: fixed; top: 0; left: 0; z-index: -1; }

        #letter {
            margin-top: 50px;
            font-size: clamp(20px, 6vw, 28px);
            width: 90%;
            margin: 60px auto 30px auto;
            line-height: 1.5;
            min-height: 4em;
        }

        #buttons {
            position: relative;
            min-height: 150px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px; /* Расстояние между кнопками в начале */
        }

        button {
            padding: 20px 40px;
            font-size: clamp(22px, 7vw, 30px);
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
            transition: transform 0.2s, opacity 0.3s, left 0.3s, top 0.3s;
            z-index: 1000;
        }

        #yes { background: #ff2e6e; color: white; box-shadow: 0 0 25px rgba(255, 46, 110, 0.6); }
        
        #no { 
            background: #444; 
            color: white; 
            position: relative; /* В начале стоит в потоке */
            white-space: nowrap; 
        }

        #gallery {
            display: none;
            margin-top: 40px;
            position: relative;
            min-height: 550px;
            width: 100%;
        }

        #gallery img {
            width: clamp(95px, 24vw, 140px);
            height: clamp(95px, 24vw, 140px);
            object-fit: cover;
            border-radius: 50%;
            border: 3px solid #ff2e6e;
            position: absolute;
            opacity: 0;
            transform: scale(0.5);
            transition: all 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        #gallery img.show { opacity: 1; transform: scale(1); }

        #game { display: none; margin-top: 40px; }
        .heart {
            position: absolute;
            font-size: 45px;
            cursor: pointer;
            z-index: 100;
            filter: drop-shadow(0 0 10px #ff2e6e);
        }

        #overlay {
            display: none; position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.95);
            z-index: 9999; justify-content: center; align-items: center;
        }
        #overlay img { max-width: 95%; max-height: 85%; border-radius: 15px; border: 2px solid #ff2e6e; }

        #final-message {
            display: none;
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(25, 25, 25, 0.98);
            padding: 30px;
            border-radius: 25px;
            border: 2px solid #ff2e6e;
            z-index: 10000;
            width: 85%;
            box-shadow: 0 0 60px rgba(255, 46, 110, 0.5);
        }
    </style>
</head>
<body>

<canvas id="space"></canvas>
<h1>For You, Kassi ❤️</h1>
<div id="letter"></div>

<div id="buttons">
    <button id="yes" onclick="yes()">Yes ❤️</button>
    <button id="no">No</button>
</div>

<div id="gallery">
    <h2>Our Memories 📸</h2>
    <img src="1.jpeg"> <img src="2.jpeg"> <img src="3.jpeg"> <img src="4.jpeg">
    <img src="5.jpeg"> <img src="6.jpeg"> <img src="7.jpeg"> <img src="8.jpeg">
    <img src="9.jpeg"> <img src="10.jpeg"> <img src="11.jpeg"> <img src="12.jpeg">
</div>

<div id="game">
    <h2>Поймай мои сердечки! 🎮</h2>
    <p style="font-size: 24px; color: #ff2e6e;">Score: <span id="score">0</span> / 10</p>
</div>

<div id="overlay" onclick="this.style.display='none'">
    <img id="bigImage" src="">
</div>

<div id="final-message">
    <h2 style="color: #ff2e6e;">С 8 Марта, Касси! 💐</h2>
    <p id="wish-text" style="font-size: 20px; line-height: 1.6;"></p>
    <button style="background: #ff2e6e; color: white;" onclick="document.getElementById('final-message').style.display='none'">❤️</button>
</div>

<script>
    const textStr = "Ya sdelal etu malenkuyu vselennuiu dlya tebiya. Potomu chto kogda ty riadom , moi mir stanovitsyia iarche!❤️";
    let charIdx = 0;
    function type() {
        if (charIdx < textStr.length) {
            document.getElementById("letter").innerHTML += textStr.charAt(charIdx);
            charIdx++;
            setTimeout(type, 45);
        }
    }
    type();

    /* ЛОГИКА КНОПКИ NO */
    let noBtn = document.getElementById("no");
    let noScale = 1.0;
    let noOpacity = 1.0;

    function moveNo(e) {
        if (e) e.preventDefault();
        
        // Делаем кнопку абсолютной при первом же взаимодействии
        noBtn.style.position = "absolute";
        
        // Уменьшаем размер и прозрачность
        noScale -= 0.15;
        noOpacity -= 0.15;
        
        if (noScale < 0.2) noScale = 0.2; // Чтобы совсем не исчезла в ноль
        if (noOpacity < 0.2) noOpacity = 0.2;

        let x = Math.random() * (window.innerWidth - 120);
        let y = Math.random() * (window.innerHeight - 120);

        noBtn.style.left = Math.max(10, x) + "px";
        noBtn.style.top = Math.max(10, y) + "px";
        noBtn.style.transform = `scale(${noScale})`;
        noBtn.style.opacity = noOpacity;
    }

    noBtn.addEventListener("touchstart", moveNo);
    noBtn.addEventListener("mouseover", moveNo);

    function yes() {
        drawHeartBg();
        document.getElementById("buttons").style.display = "none";
        document.getElementById("gallery").style.display = "block";
        document.getElementById("game").style.display = "block";
        arrangePhotos();
        startGame();
        setupClicks();
    }

    function arrangePhotos() {
        const images = document.querySelectorAll("#gallery img");
        const isSmall = window.innerWidth < 600;
        const scale = isSmall ? 0.75 : 1.1; 
        const coords = [
            {x: 0, y: 160}, {x: -80, y: 100}, {x: -150, y: 20}, {x: -160, y: -70},
            {x: -100, y: -140}, {x: -30, y: -100}, {x: 30, y: -100}, {x: 100, y: -140},
            {x: 160, y: -70}, {x: 150, y: 20}, {x: 80, y: 100}, {x: 0, y: -20}
        ];
        images.forEach((img, index) => {
            const imgOffset = img.offsetWidth / 2 || 50;
            img.style.left = `calc(50% + ${(coords[index].x * scale)}px - ${imgOffset}px)`;
            img.style.top = `calc(${isSmall ? 180 : 250}px + ${(coords[index].y * scale)}px)`;
            setTimeout(() => img.classList.add("show"), index * 200); 
        });
    }

    function setupClicks() {
        document.querySelectorAll("#gallery img").forEach(img => {
            img.onclick = function() {
                document.getElementById("bigImage").src = this.src;
                document.getElementById("overlay").style.display = "flex";
            }
        });
    }

    function showFinal() {
        document.getElementById("final-message").style.display = "block";
        let msg = "Умничка! Ты поймала все сердечки, но самое главное — моё — уже давно у тебя. Пусть этот день будет таким же красивым, как твоя улыбка. Спасибо, что ты есть в моей вселенной! Я люблю тебя моя принцесса, с 8 марта!";
        let j = 0;
        let wish = document.getElementById("wish-text");
        function typeFinal() {
            if (j < msg.length) { wish.innerHTML += msg.charAt(j); j++; setTimeout(typeFinal, 40); }
        }
        typeFinal();
    }

    function drawHeartBg() {
        let hCanvas = document.createElement("canvas");
        hCanvas.width = 400; hCanvas.height = 400;
        hCanvas.style.position = "fixed"; hCanvas.style.left = "50%"; hCanvas.style.top = "50%";
        hCanvas.style.transform = "translate(-50%, -50%)"; hCanvas.style.zIndex = "-1";
        hCanvas.style.opacity = "0.4"; document.body.appendChild(hCanvas);
        let ctx = hCanvas.getContext("2d");
        let t = 0;
        function anim() {
            ctx.clearRect(0, 0, 400, 400); ctx.fillStyle = "#ff2e6e"; ctx.beginPath();
            for (let i = 0; i < Math.PI * 2; i += 0.02) {
                let x = 16 * Math.pow(Math.sin(i), 3);
                let y = 13 * Math.cos(i) - 5 * Math.cos(2 * i) - 2 * Math.cos(3 * i) - Math.cos(4 * i);
                let s = 11 + Math.sin(t) * 1.5; ctx.lineTo(200 + x * s, 200 - y * s);
            }
            ctx.fill(); t += 0.05; requestAnimationFrame(anim);
        }
        anim();
    }

    let space = document.getElementById("space");
    let sCtx = space.getContext("2d");
    function res() { space.width = window.innerWidth; space.height = window.innerHeight; }
    window.onresize = res; res();
    let stars = [];
    for (let j = 0; j < 120; j++) stars.push({ x: Math.random() * space.width, y: Math.random() * space.height, r: Math.random() * 2 });
    function drawStars() {
        sCtx.clearRect(0, 0, space.width, space.height); sCtx.fillStyle = "white";
        stars.forEach(s => { sCtx.beginPath(); sCtx.arc(s.x, s.y, s.r, 0, Math.PI * 2); sCtx.fill(); });
        requestAnimationFrame(drawStars);
    }
    drawStars();

    let score = 0;
    let over = false;
    function startGame() {
        let itv = setInterval(() => {
            if (over) { clearInterval(itv); return; }
            let h = document.createElement("div");
            h.innerHTML = "❤️"; h.className = "heart";
            h.style.left = Math.random() * (window.innerWidth - 60) + "px";
            h.style.top = Math.random() * (window.innerHeight - 60) + "px";
            h.onclick = function() {
                score++; document.getElementById("score").innerText = score;
                h.remove();
                if (score === 10) { over = true; showFinal(); }
            }
            document.body.appendChild(h);
            setTimeout(() => { if(h) h.remove(); }, 2000);
        }, 800);
    }
</script>
</body>
</html>
